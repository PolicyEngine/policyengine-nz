name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
    
    - name: Build package
      run: |
        uv build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1